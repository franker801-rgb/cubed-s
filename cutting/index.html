<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CUTTING | Eleven 7 Fashion</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
</head>
<body>

    <section id="login-page" class="page active">
        <div class="glass-box">
            <h1 class="royal-title">CUTTING</h1>
            <p class="tagline">Eleven 7 Fashion Studio</p>
            <input type="text" id="uName" placeholder="Enter Your Name">
            <input type="tel" id="uPhone" placeholder="Mobile Number">
            <button class="prime-btn" onclick="enterShop()">ENTER STUDIO</button>
            <p onclick="openAdmin()" class="admin-trigger">Staff Login</p>
        </div>
    </section>

    <section id="shop-page" class="page">
        <nav class="royal-nav">
            <div class="nav-logo">CUTTING</div>
            <div class="nav-right">
                <button class="view-list-btn" onclick="togglePublicList()">
                    <span class="pulse"></span> 📅 ACTIVE SLOTS
                </button>
                <div id="welcome-user" class="user-tag"></div>
            </div>
        </nav>

        <div id="public-booking-modal" class="mini-modal">
            <div class="mini-modal-header">
                <h4>Today's Schedule</h4>
                <span class="close-mini" onclick="togglePublicList()">&times;</span>
            </div>
            <div id="public-list-items"></div>
        </div>

        <div class="main-wrapper">
            <h2 class="sub-title">Signature Services</h2>
            <div id="services-grid" class="royal-grid"></div>
        </div>
    </section>

    <section id="admin-page" class="page">
        <div class="admin-wrap">
            <div class="admin-head">
                <h2>Admin Management</h2>
                <button class="close-x" onclick="location.reload()">Back</button>
            </div>
            <div class="admin-grid">
                <div class="admin-card">
                    <h3>Add New Style</h3>
                    <input type="text" id="newSName" placeholder="Style Name">
                    <input type="number" id="newSPrice" placeholder="Price (₹)">
                    <input type="number" id="newSTime" placeholder="Duration (Minutes)">
                    <label class="upload-btn">📸 Select from Album
                        <input type="file" id="newSImgFile" accept="image/*" hidden>
                    </label>
                    <div id="preview"></div>
                    <button class="prime-btn" onclick="addNewService()">PUBLISH STYLE</button>
                    <hr>
                    <div id="admin-styles-list" class="mini-list"></div>
                </div>
                <div class="admin-card">
                    <h3>Pending Bookings</h3>
                    <div id="admin-booking-list"></div>
                </div>
            </div>
        </div>
    </section>

    <div id="pay-modal" class="modal">
        <div class="modal-box">
            <h3 id="style-name-modal"></h3>
            <p id="style-details-modal"></p>
            <button class="pay-option" onclick="payWith()">PAY WITH UPI APP</button>
            <div id="after-pay-check" style="display:none; margin-top:15px;">
                <button class="confirm-btn-final" onclick="finalSubmit()">I HAVE PAID - CONFIRM</button>
            </div>
            <button class="cancel-link" onclick="closeModal()">Cancel</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
